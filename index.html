<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interaktif Sunum</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="presentation-shell" aria-label="Interaktif sunum">
      <section class="slide-stage" id="stage" aria-live="polite">
        <img id="slideImage" class="slide-image" alt="" draggable="false" />
        <div id="hotspots" class="hotspot-layer" aria-label="Slayt bağlantıları"></div>
        <div id="tocButtons" class="toc-buttons" aria-label="Ek bölüm bağlantıları"></div>
        <div id="flipLayer" class="flip-layer" aria-hidden="true">
          <img id="flipBack" class="flip-back" alt="" draggable="false" />
          <div id="flipPage" class="flip-page">
            <img id="flipFront" alt="" draggable="false" />
          </div>
        </div>
      </section>

      <nav class="control-bar" aria-label="Sunum kontrolleri">
        <button class="icon-button" id="homeBtn" type="button" aria-label="İçindekiler" title="İçindekiler">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m3 10 9-7 9 7" />
            <path d="M5 10v10h14V10" />
            <path d="M9 20v-6h6v6" />
          </svg>
        </button>
        <button class="icon-button" id="prevBtn" type="button" aria-label="Önceki slayt" title="Önceki slayt">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18 9 12l6-6" />
          </svg>
        </button>
        <div class="slide-counter" id="slideCounter" aria-label="Slayt numarası"></div>
        <button class="icon-button" id="nextBtn" type="button" aria-label="Sonraki slayt" title="Sonraki slayt">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>
        <button class="icon-button" id="fullscreenBtn" type="button" aria-label="Tam ekran" title="Tam ekran">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H3v5" />
            <path d="M16 3h5v5" />
            <path d="M21 16v5h-5" />
            <path d="M3 16v5h5" />
          </svg>
        </button>
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
